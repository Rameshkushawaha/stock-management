<div class="shell" [class.sidebar-open]="sidebarOpen">

  <!-- Sidebar -->
  <aside class="sidebar">
    <!-- Logo -->
    <div class="sidebar__brand">
      <div class="sidebar__logo">
        <svg viewBox="0 0 32 32" fill="none">
          <rect width="32" height="32" rx="8" fill="#3b82f6"/>
          <path d="M8 11h16M8 16h16M8 21h10" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
          <rect x="20" y="18" width="6" height="6" rx="1" fill="#fff" opacity="0.9"/>
        </svg>
      </div>
      <span class="sidebar__name">StockSys</span>
    </div>

    <!-- Nav -->
    <nav class="sidebar__nav">
      <ng-container *ngFor="let section of navSections">
        <div class="nav-section-label">{{ section.label }}</div>
        <a *ngFor="let item of section.items"
           [routerLink]="item.path"
           (click)="onNavClick()"
           class="nav-item"
           [class.nav-item--active]="isActive(item.path)">
          <span class="nav-item__icon">
            <ng-container [ngSwitch]="item.icon">
              <svg *ngSwitchCase="'dashboard'" viewBox="0 0 20 20" fill="currentColor"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/></svg>
              <svg *ngSwitchCase="'scan'" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 4a1 1 0 011-1h3a1 1 0 010 2H5v2a1 1 0 01-2 0V4zm9-1a1 1 0 000 2h2v2a1 1 0 102 0V4a1 1 0 00-1-1h-3zM3 14a1 1 0 102 0v-2h2a1 1 0 100-2H4a1 1 0 00-1 1v3zm11 1a1 1 0 001-1v-3a1 1 0 00-1-1h-3a1 1 0 100 2h2v2a1 1 0 001 1z" clip-rule="evenodd"/></svg>
              <svg *ngSwitchCase="'products'" viewBox="0 0 20 20" fill="currentColor"><path d="M4 3a2 2 0 100 4h12a2 2 0 100-4H4z"/><path fill-rule="evenodd" d="M3 8h14v7a2 2 0 01-2 2H5a2 2 0 01-2-2V8zm5 3a1 1 0 011-1h2a1 1 0 110 2H9a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
              <svg *ngSwitchCase="'alert'" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
              <svg *ngSwitchCase="'fire'" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M12.395 2.553a1 1 0 00-1.45-.385c-.345.23-.614.558-.822.88-.214.33-.403.713-.57 1.116-.334.804-.614 1.768-.84 2.734a31.365 31.365 0 00-.613 3.58 2.64 2.64 0 01-.945-1.067c-.328-.68-.398-1.534-.398-2.654A1 1 0 005.05 6.05 6.981 6.981 0 003 11a7 7 0 1011.95-4.95c-.592-.591-.98-.985-1.348-1.467-.363-.476-.724-1.063-1.207-2.03zM12.12 15.12A3 3 0 017 13s.879.5 2.5.5c0-1 .5-4 1.25-4.5.5 1 .786 1.293 1.371 1.879A2.99 2.99 0 0113 13a2.99 2.99 0 01-.879 2.121z" clip-rule="evenodd"/></svg>
              <svg *ngSwitchCase="'money'" viewBox="0 0 20 20" fill="currentColor"><path d="M8.433 7.418c.155-.103.346-.196.567-.267v1.698a2.305 2.305 0 01-.567-.267C8.07 8.34 8 8.114 8 8c0-.114.07-.34.433-.582zM11 12.849v-1.698c.22.071.412.164.567.267.364.243.433.468.433.582 0 .114-.07.34-.433.582a2.305 2.305 0 01-.567.267z"/><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-13a1 1 0 10-2 0v.092a4.535 4.535 0 00-1.676.662C6.602 6.234 6 7.009 6 8c0 .99.602 1.765 1.324 2.246.48.32 1.054.545 1.676.662v1.941c-.391-.127-.68-.317-.843-.504a1 1 0 10-1.51 1.31c.562.649 1.413 1.076 2.353 1.253V15a1 1 0 102 0v-.092a4.535 4.535 0 001.676-.662C13.398 13.766 14 12.991 14 12c0-.99-.602-1.765-1.324-2.246A4.535 4.535 0 0011 9.092V7.151c.391.127.68.317.843.504a1 1 0 101.511-1.31c-.563-.649-1.413-1.076-2.354-1.253V5z" clip-rule="evenodd"/></svg>
            </ng-container>
          </span>
          <span class="nav-item__label">{{ item.label }}</span>
          <span *ngIf="item.badge && item.badge > 0" class="nav-item__badge">{{ item.badge }}</span>
        </a>
      </ng-container>
    </nav>

    <!-- User -->
    <div class="sidebar__user">
      <div class="user-avatar">{{ user?.avatar }}</div>
      <div class="user-info">
        <span class="user-name">{{ user?.name }}</span>
        <span class="user-role" [ngClass]="getRoleBadgeClass()">{{ getRoleLabel() }}</span>
      </div>
      <button class="logout-btn" (click)="logout()" title="Sign out">
        <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 3a1 1 0 00-1 1v12a1 1 0 102 0V4a1 1 0 00-1-1zm10.293 9.293a1 1 0 001.414 1.414l3-3a1 1 0 000-1.414l-3-3a1 1 0 10-1.414 1.414L14.586 9H7a1 1 0 100 2h7.586l-1.293 1.293z" clip-rule="evenodd"/></svg>
      </button>
    </div>
  </aside>
<div class="sidebar-backdrop" *ngIf="sidebarOpen" (click)="closeSidebar()"></div>
  <!-- Main -->
  <div class="main-wrap">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar__left">
        <button class="topbar__menu" (click)="openSidebar()" title="Toggle menu">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 10a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM3 15a1 1 0 011-1h6a1 1 0 110 2H4a1 1 0 01-1-1z" clip-rule="evenodd"/></svg>
        </button>
      </div>
      <nav class="topbar__nav">
        <a routerLink="/dashboard" routerLinkActive="active" *ngIf="auth.can('view-reports')">Dashboard</a>
        <a routerLink="/scanner" routerLinkActive="active">Scanner</a>
        <a routerLink="/products" routerLinkActive="active" *ngIf="auth.can('manage')">Reports</a>
        <a routerLink="/settings" routerLinkActive="active" *ngIf="auth.can('manage')">Settings</a>
      </nav>
      <div class="topbar__right">
        <button class="topbar__btn" (click)="logout()">Sign out</button>
      </div>
    </header>

    <!-- Page content -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
