
<div class="page">
  <div class="page-head">
    <h1>Products</h1>
    <p>All inventory items with stock levels</p>
  </div>

  <div class="toolbar">
    <div class="search-box">
      <svg viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd"/>
      </svg>
      <input type="text" [(ngModel)]="search" (input)="filter()" placeholder="Search products or barcode…" />
    </div>
    
    <select [(ngModel)]="cat" (change)="filter()">
      <option value="">All Categories</option>
      <option *ngFor="let c of categories" [value]="c">{{c}}</option>
    </select>
  </div>

  <div class="card">
    <table class="table">
      <thead>
        <tr>
          <th>BARCODE</th>
          <th>PRODUCT</th>
          <th>CATEGORY</th>
          <th>PRICE</th>
          <th>STOCK</th>
          <th>STATUS</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of filtered">
          <td class="mono muted">{{p.barcode}}</td>
          <td>
            <div class="prod-cell">
              <span class="prod-name">{{p.name}}</span>
              <span class="prod-desc">{{p.brand.name}} • {{p.unit.abbreviation}}</span>
            </div>
          </td>
          <td><span class="cat-tag">{{p.category.name}}</span></td>
          <td class="price">{{fmt(getPrice(p))}}</td>
          <td class="bold">{{p.currentStock}} {{p.unit.abbreviation}}</td>
          <td>
            <span class="status-pill" [class]="'status-pill--' + stockClass(p)">
              {{stockLabel(p)}}
            </span>
          </td>
        </tr>
        <tr *ngIf="filtered.length === 0">
          <td colspan="6" class="empty">No products found</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
